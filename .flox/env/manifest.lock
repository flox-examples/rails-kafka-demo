{
  "lockfile-version": 1,
  "manifest": {
    "schema-version": "1.12.0",
    "install": {
      "apacheKafka": {
        "pkg-path": "apacheKafka",
        "pkg-group": "kafka"
      },
      "gcc": {
        "pkg-path": "gcc"
      },
      "gnumake": {
        "pkg-path": "gnumake"
      },
      "openssl": {
        "pkg-path": "openssl"
      },
      "pkg-config": {
        "pkg-path": "pkg-config"
      },
      "postgresql": {
        "pkg-path": "postgresql",
        "pkg-group": "postgresql",
        "outputs": "all"
      },
      "rdkafka": {
        "pkg-path": "rdkafka"
      },
      "ruby": {
        "pkg-path": "ruby_3_3"
      },
      "zlib": {
        "pkg-path": "zlib"
      }
    },
    "vars": {
      "KAFKA_CONTROLLER_PORT": "9093",
      "KAFKA_HOST": "localhost",
      "KAFKA_PORT": "9092",
      "PGDATABASE": "rails_kafka_demo_development",
      "PGHOSTADDR": "127.0.0.1",
      "PGPASS": "",
      "PGPORT": "5432",
      "PGUSER": "postgres",
      "RAILS_ENV": "development",
      "RUBY_AUTO_INSTALL": "false",
      "USE_SYSTEM_LIBRDKAFKA": "true"
    },
    "hook": {
      "on-activate": "export RUBY_CACHE=\"$FLOX_ENV_CACHE/ruby\"\nexport BUNDLE_PATH=\"$RUBY_CACHE/vendor\"\nmkdir -p \"$RUBY_CACHE\"\n\nif [ \"$RUBY_AUTO_INSTALL\" = \"true\" ] \\\n    && [ -f Gemfile ] \\\n    && [ -f Gemfile.lock ]; then\n  HASH=$(cat Gemfile Gemfile.lock \\\n    | sha256sum | cut -d\" \" -f1)\n  LAST=$(cat \"$RUBY_CACHE/gems-hash\" 2>/dev/null)\n  if [ \"$HASH\" != \"$LAST\" ]; then\n    bundle install\n    echo \"$HASH\" > \"$RUBY_CACHE/gems-hash\"\n  fi\nfi\n\nexport PGDIR=\"$FLOX_ENV_CACHE/postgres\"\nexport PGDATA=\"$PGDIR/data\"\n\n# Socket dir must be short to stay under the 103-byte\n# unix socket path limit. Use a hash of $PGDIR to keep\n# it unique per environment.\nSOCKETDIR=\"/tmp/flox-pg-$(echo \"$PGDIR\" | cksum | cut -d' ' -f1)\"\n\nif [[ ! -d \"$SOCKETDIR\" ]]; then\n  mkdir -p \"$SOCKETDIR\"\nfi\n\nif [[ -n \"${PGPORT:-}\" ]]; then\n  # TCP mode: PGPORT is set, clients connect via host:port\n  export PGHOST=\"$PGHOSTADDR\"\n  export DATABASE_URL=\"postgresql://$PGUSER:$PGPASS@$PGHOSTADDR:$PGPORT/$PGDATABASE\"\n  PG_LISTEN_FLAGS=\"-c listen_addresses=$PGHOSTADDR -p $PGPORT\"\nelse\n  # Socket mode: no PGPORT, clients connect via unix socket\n  unset PGHOSTADDR\n  export PGHOST=\"$SOCKETDIR\"\n  export DATABASE_URL=\"postgresql:///$PGDATABASE?host=$SOCKETDIR\"\n  PG_LISTEN_FLAGS=\"\"\nfi\n\nINIT_LOG=\"$PGDIR/init.log\"\n\npg_init_fail() {\n  echo \"ERROR: PostgreSQL initialization failed.\" >&2\n  if [ -f \"$INIT_LOG\" ]; then\n    echo \"--- init.log ---\" >&2\n    cat \"$INIT_LOG\" >&2\n    echo \"--- end init.log ---\" >&2\n  fi\n  exit 1\n}\n\nif [[ ! -d \"$PGDATA\" ]]; then\n  mkdir -p \"$PGDATA\"\n  initdb \"$PGDATA\" \\\n    --locale=C \\\n    --encoding=UTF8 \\\n    --auth=trust \\\n    --username \"$PGUSER\" \\\n    >> \"$INIT_LOG\" 2>&1 \\\n    || pg_init_fail\nfi\n\npg_ctl -D \"$PGDATA\" -w start \\\n  -o \"-c unix_socket_directories=$SOCKETDIR $PG_LISTEN_FLAGS\" \\\n  >> \"$INIT_LOG\" 2>&1 \\\n  || pg_init_fail\nif psql -lqt | cut -d \\| -f 1 | grep -qw \"$PGDATABASE\"; then\n  true\nelse\n  createdb >> \"$INIT_LOG\" 2>&1 || pg_init_fail\nfi\npg_ctl -D \"$PGDATA\" -m fast -w stop >> \"$INIT_LOG\" 2>&1\nrm -f \"$INIT_LOG\"\n\nexport KAFKA_CACHE=\"$FLOX_ENV_CACHE/kafka\"\nexport KAFKA_LOG_DIRS=\"$KAFKA_CACHE/logs\"\nexport KAFKA_CONFIG_FILE=\"$KAFKA_CACHE/server.properties\"\n# Derive the broker list from host/port so overriding either stays\n# consistent; respects an explicit KAFKA_BROKERS override if set.\nexport KAFKA_BROKERS=\"${KAFKA_BROKERS:-${KAFKA_HOST}:${KAFKA_PORT}}\"\n\nmkdir -p \"$KAFKA_LOG_DIRS\"\n\nif [ ! -f \"$KAFKA_CONFIG_FILE\" ]; then\n  cat > \"$KAFKA_CONFIG_FILE\" <<EOF\nprocess.roles=broker,controller\nnode.id=1\ncontroller.quorum.voters=1@${KAFKA_HOST}:${KAFKA_CONTROLLER_PORT}\nlisteners=PLAINTEXT://${KAFKA_HOST}:${KAFKA_PORT},CONTROLLER://${KAFKA_HOST}:${KAFKA_CONTROLLER_PORT}\ninter.broker.listener.name=PLAINTEXT\nadvertised.listeners=PLAINTEXT://${KAFKA_HOST}:${KAFKA_PORT}\ncontroller.listener.names=CONTROLLER\nlistener.security.protocol.map=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT\nlog.dirs=${KAFKA_LOG_DIRS}\nnum.network.threads=3\nnum.io.threads=8\nsocket.send.buffer.bytes=102400\nsocket.receive.buffer.bytes=102400\nsocket.request.max.bytes=104857600\nnum.partitions=1\nnum.recovery.threads.per.data.dir=1\noffsets.topic.replication.factor=1\ntransaction.state.log.replication.factor=1\ntransaction.state.log.min.isr=1\ndefault.replication.factor=1\nmin.insync.replicas=1\nlog.retention.hours=168\nlog.segment.bytes=1073741824\nlog.retention.check.interval.ms=300000\nEOF\nfi\n\nif [ ! -f \"${KAFKA_LOG_DIRS}/meta.properties\" ]; then\n  CLUSTER_ID=\"$(kafka-storage.sh random-uuid)\"\n  kafka-storage.sh format -t \"$CLUSTER_ID\" -c \"$KAFKA_CONFIG_FILE\" --ignore-formatted\nfi\n"
    },
    "profile": {
      "common": "test()     { RAILS_ENV=test bundle exec rspec \"$@\"; }\nlint()     { bundle exec rubocop \"$@\"; }\nconsumer() { bundle exec ruby bin/kafka_consumer \"$@\"; }\nsetup()    { bin/setup \"$@\"; }\n"
    },
    "options": {},
    "services": {
      "kafka": {
        "command": "  exec kafka-server-start.sh \"$KAFKA_CONFIG_FILE\"\n",
        "shutdown": {
          "command": "kafka-server-stop.sh"
        }
      },
      "postgres": {
        "command": "  PGDATA=\"$FLOX_ENV_CACHE/postgres/data\"\n  SOCKETDIR=\"/tmp/flox-pg-$(echo \"$FLOX_ENV_CACHE/postgres\" | cksum | cut -d' ' -f1)\"\n  mkdir -p \"$SOCKETDIR\"\n  if [[ -n \"${PGPORT:-}\" ]]; then\n    exec postgres -D \"$PGDATA\" -c unix_socket_directories=\"$SOCKETDIR\" -c listen_addresses=\"$PGHOSTADDR\" -p \"$PGPORT\"\n  else\n    exec postgres -D \"$PGDATA\" -c unix_socket_directories=\"$SOCKETDIR\" -c listen_addresses=\"\"\n  fi\n"
      }
    }
  },

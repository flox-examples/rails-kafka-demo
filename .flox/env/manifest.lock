  "manifest": {
    "schema-version": "1.12.0",
    "install": {
      "apacheKafka": {
        "pkg-path": "apacheKafka"
      },
      "gcc": {
        "pkg-path": "gcc"
      },
      "gnumake": {
        "pkg-path": "gnumake"
      },
      "openssl": {
        "pkg-path": "openssl"
      },
      "pkg-config": {
        "pkg-path": "pkg-config"
      },
      "postgresql": {
        "pkg-path": "postgresql_16"
      },
      "rdkafka": {
        "pkg-path": "rdkafka"
      },
      "ruby": {
        "pkg-path": "ruby_3_3"
      },
      "zlib": {
        "pkg-path": "zlib"
      }
    },
    "vars": {
      "DATABASE_URL": "postgresql://postgres@127.0.0.1:5432/rails_kafka_demo_development",
      "KAFKA_BROKERS": "localhost:9092",
      "PGHOST": "127.0.0.1",
      "PGPASSWORD": "",
      "PGPORT": "5432",
      "PGUSER": "postgres",
      "RAILS_ENV": "development",
      "USE_SYSTEM_LIBRDKAFKA": "true"
    },
    "hook": {
      "on-activate": "# Mirrors devbox.json init_hook + the one PGDATA path that was\n# $DEVBOX_PROJECT_ROOT-relative (now $FLOX_ENV_CACHE-relative).\nexport PGDATA=\"$FLOX_ENV_CACHE/postgres/data\"\nsource .env.local 2>/dev/null || true\n"
    },
    "profile": {
      "common": "# Mirrors devbox.json scripts. Note: test() shadows the shell builtin\n# inside this environment, matching `devbox run test` semantics.\ntest()     { RAILS_ENV=test bundle exec rspec \"$@\"; }\nlint()     { bundle exec rubocop \"$@\"; }\nconsumer() { bundle exec ruby bin/kafka_consumer \"$@\"; }\nsetup()    { bin/setup \"$@\"; }\n"
    },
    "options": {},
    "services": {
      "kafka": {
        "command": "export DEVBOX_PROJECT_ROOT=\"$FLOX_ENV_PROJECT\"\nexec \"$FLOX_ENV_PROJECT/bin/start-kafka\"\n",
        "shutdown": {
          "command": "kafka-server-stop.sh"
        }
      },
      "postgres": {
        "command": "export PGDATA=\"$FLOX_ENV_CACHE/postgres/data\"\nmkdir -p \"$PGDATA\"\nif [ ! -f \"$PGDATA/PG_VERSION\" ]; then\n  initdb -D \"$PGDATA\" --auth=trust --username=postgres --no-instructions\nfi\nexec postgres -D \"$PGDATA\" -h 127.0.0.1 -p \"${PGPORT:-5432}\"\n",
        "shutdown": {
          "command": "pg_ctl stop -D \"$FLOX_ENV_CACHE/postgres/data\" -m fast\n"
        }
      }
    }
  },

schema-version = "1.12.0"

# Composition of reusable FloxHub base environments (flox/ruby,
# flox/postgresql, flox/kafka). Replaces the inlined services/vars from
# the `floxify` mirror branch. The repo's devbox.json, process-compose.yaml
# and bin/* are unchanged and unused by this Flox path.

[include]
environments = [
  { remote = "flox/ruby" },
  { remote = "flox/postgresql" },
  { remote = "flox/kafka" },
]

[install]
# Pin Ruby to 3.3 (overrides flox/ruby's default) and add the native-gem
# build toolchain (rdkafka + pg compile C extensions; USE_SYSTEM_LIBRDKAFKA
# links against the rdkafka lib). postgresql + apacheKafka come from the
# included bases.
ruby.pkg-path = "ruby_3_3"
rdkafka.pkg-path = "rdkafka"
pkg-config.pkg-path = "pkg-config"
gcc.pkg-path = "gcc"
gnumake.pkg-path = "gnumake"
zlib.pkg-path = "zlib"
openssl.pkg-path = "openssl"

[vars]
# Override flox/postgresql defaults so the base provisions the database the
# app expects (config/database.yml dev reads discrete PG* vars). Setting
# PGPORT puts the postgres base in TCP mode on 127.0.0.1:5432. PGPASS is
# emptied so the base-generated DATABASE_URL carries no stale placeholder
# (auth is trust). NOTE: changing PGUSER after first activation requires
# wiping $FLOX_ENV_CACHE/postgres.
PGHOSTADDR = "127.0.0.1"
PGPORT = "5432"
PGUSER = "postgres"
PGPASS = ""
PGDATABASE = "rails_kafka_demo_development"
RAILS_ENV = "development"
USE_SYSTEM_LIBRDKAFKA = "true"
# Keep the mirror's manual-bundle behavior (flox/ruby would otherwise run
# bundle install on every activation).
RUBY_AUTO_INSTALL = "false"

[profile]
common = '''
test()     { RAILS_ENV=test bundle exec rspec "$@"; }
lint()     { bundle exec rubocop "$@"; }
consumer() { bundle exec ruby bin/kafka_consumer "$@"; }
setup()    { bin/setup "$@"; }
'''

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (RuboCop)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
      - run: bundle exec rubocop --parallel

  test:
    name: Test (RSpec + Postgres)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: ""
          POSTGRES_HOST_AUTH_METHOD: trust
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      RAILS_ENV: test
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: ""
      KAFKA_BROKERS: localhost:9092
    steps:
      - uses: actions/checkout@v4

      - name: Install librdkafka (native dep for rdkafka gem)
        run: sudo apt-get install -y librdkafka-dev pkg-config

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true
        env:
          USE_SYSTEM_LIBRDKAFKA: "true"

      - name: Set up test database
        run: bundle exec rails db:create db:schema:load

      - name: Run RSpec
        run: bundle exec rspec --format progress

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rspec-results
          path: spec/examples.txt
          if-no-files-found: ignore

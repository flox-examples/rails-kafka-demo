version: "0.5"

processes:
  postgres:
    command: |
      mkdir -p "$PGDATA"
      if [ ! -f "$PGDATA/PG_VERSION" ]; then
        initdb -D "$PGDATA" --auth=trust --username=postgres --no-instructions
      fi
      exec postgres -D "$PGDATA" -h 127.0.0.1 -p "${PGPORT:-5432}"
    readiness_probe:
      exec:
        command: pg_isready -h 127.0.0.1 -p "${PGPORT:-5432}" -U postgres
      initial_delay_seconds: 2
      period_seconds: 1
      failure_threshold: 30
    shutdown:
      command: pg_ctl stop -D "$PGDATA" -m fast
      timeout_seconds: 10
    availability:
      restart: on_failure
      max_restarts: 3

  kafka:
    command: "${DEVBOX_PROJECT_ROOT}/bin/start-kafka"
    readiness_probe:
      exec:
        command: kafka-topics.sh --bootstrap-server localhost:9092 --list
      initial_delay_seconds: 5
      period_seconds: 2
      failure_threshold: 20
    shutdown:
      command: kafka-server-stop.sh
      timeout_seconds: 15
    availability:
      restart: on_failure
      max_restarts: 3
    depends_on:
      postgres:
        condition: process_healthy
